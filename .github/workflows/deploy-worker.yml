name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  workflow_dispatch:

# ========== 所需 GitHub Secrets ==========
# CF_API_TOKEN         Cloudflare API Token（Workers 编辑权限）
# CF_ACCOUNT_ID        Cloudflare Account ID
# CF_D1_DATABASE_ID    D1 数据库 ID
# JWT_SECRET           JWT 签名密钥（每次部署自动同步到 Worker Secret）
# 注意：GitHub Secret 名称不得以 GITHUB_ 开头

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: '10.15.1'

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (Backend)
        run: pnpm run typecheck

      - name: Typecheck (Frontend)
        run: pnpm run typecheck
        working-directory: ./frontend

      - name: Build Frontend
        run: pnpm run build
        working-directory: ./frontend

      - name: Inject D1 database_id
        run: |
          sed -i "s/__D1_DATABASE_ID__/${{ secrets.CF_D1_DATABASE_ID }}/g" wrangler.toml

      - name: Deploy Worker (API + Static Frontend)
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Sync JWT_SECRET
        run: echo "${{ secrets.JWT_SECRET }}" | npx wrangler secret put JWT_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Init D1 Database
        run: npx wrangler d1 execute sun-panel-db --remote --file=./schema.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        continue-on-error: true